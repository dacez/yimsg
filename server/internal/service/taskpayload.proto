syntax = "proto3";

// taskpayload.proto 定义异步任务队列（server/internal/taskqueue）fanout 任务的持久化
// 载荷。这是服务端内部实现细节，不是 protocol/yimsg.proto 定义的
// 客户端-服务端协议，因此单独成组；tools/cmd/protocolgen 仅统一调用 protoc 和补 SPDX，
// 不把它纳入公开协议 manifest。
//
// 重新生成：在仓库根目录运行
//   go run ./tools/cmd/protocolgen

package yimsg.service.task;

option go_package = "yimsg/server/internal/service/taskpb;taskpb";

// GroupMessageTask 是一条群消息（普通或撤回）向其余成员 fanout 的任务载荷。
// Recalled 为 true 时携带撤回相关字段：把原消息覆盖为撤回占位，并写入一条撤回事件消息。
message GroupMessageTask {
  string msg_id = 1;
  int64 from_uid = 2;
  int64 group_id = 3;
  bool recalled = 4;
  int32 msg_type = 5;
  bytes body = 6;
  string search_text = 7;
  int64 send_time = 8;
  repeated int64 target_uids = 9;
  string recall_msg_id = 10;
  int32 recall_msg_type = 11;
  bytes recall_body = 12;
  string recall_search_text = 13;
  int64 recall_time = 14;
}

// GroupSystemTask 是一条群系统消息向全体成员 fanout 的任务载荷。
message GroupSystemTask {
  string msg_id = 1;
  int64 group_id = 2;
  bytes body = 3;
  string search_text = 4;
  int64 send_time = 5;
  repeated int64 uids = 6;
}

// OrgUpdatedTask 是 org:updated 扇出任务载荷。
message OrgUpdatedTask {
  int64 org_id = 1;
}

// OrgDeletedTask 是组织删除后、成员通讯录组织行异步清理任务载荷。
// MemberUIDs 在组织结构物理删除前快照——事后组织分片已经查不到"谁曾是成员"。
message OrgDeletedTask {
  int64 org_id = 1;
  repeated int64 member_uids = 2;
}
