}

message UnfavoriteGroupRequest {
  int64 group_id = 10; // required 群 ID
}
message UnfavoriteGroupResponse {
  BaseResponse base = 1; // required 通用响应状态
  int64 seq = 10; // required 通讯录同步序号
}

message BlockUserRequest {
  int64 uid = 10; // required 被屏蔽用户 ID
}
message BlockUserResponse {
  BaseResponse base = 1; // required 通用响应状态
  int64 seq = 10; // required 屏蔽列表同步序号
}

message UnblockUserRequest {
  int64 uid = 10; // required 解除屏蔽用户 ID
}
message UnblockUserResponse {
  BaseResponse base = 1; // required 通用响应状态
  int64 seq = 10; // required 屏蔽列表同步序号
}

message GetBlocklistRequest {
  optional BlocklistStatus status = 10; // optional 屏蔽状态过滤；不填表示不过滤，显式传 0 返回 ERROR_INVALID_ARGUMENT
  repeated int64 uids = 11; // optional 目标用户 ID 列表；单个查询传 1 个元素，命中时忽略 page 分页
  PageQuery page = 12; // optional 展示分页游标；按 seq 倒序（新→旧），游标对客户端不透明
}
message GetBlocklistResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated BlocklistUser users = 10; // optional 屏蔽列表用户
  PageInfo page = 11; // required 展示分页信息
}

message SyncBlocklistRequest {
  int64 last_seq = 10; // optional 客户端最后同步序号
  int64 limit = 11; // optional 同步条数
  bool rebuild = 12; // optional 是否强制重建本地视图
}
message SyncBlocklistResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated BlocklistUser users = 10; // optional 增量屏蔽用户
  bool has_more = 11; // required 是否还有更多增量条目（达到 limit 时为 true）
  int64 cursor_seq = 12; // required 下一次增量同步应使用的 last_seq 游标，等于本批最大 seq；本批为空时为 0
}

message SendMessageRequest {
  ConversationTarget target = 10; // required 会话目标
  MessageType msg_type = 11; // required 消息类型，必须与 body.kind 一致
  MessageBody body = 12; // required 结构化消息正文；撤回时 msg_type=MESSAGE_TYPE_RECALL，body.recall 仅需填 msg_id
  string msg_id = 13; // required 消息 ID，UUIDv7 的 base64url 编码，固定 22 字符，由 SDK 生成；缺失或非法直接拒绝；撤回时为撤回事件消息的 ID
}
message SendMessageResponse {
  BaseResponse base = 1; // required 通用响应状态
  int64 seq = 10; // required 消息序号
  string msg_id = 11; // required 消息 ID
}

message SyncMessagesRequest {
  int64 last_seq = 10; // optional 客户端最后同步序号
  int64 limit = 11; // optional 同步条数
}
message SyncMessagesResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated Message messages = 10; // optional 增量消息
  bool has_more = 11; // required 是否还有更多增量条目（达到 limit 时为 true）
  int64 cursor_seq = 12; // required 下一次增量同步应使用的 last_seq 游标，等于本批最大 seq；本批为空时为 0
}

message GetMessagesRequest {
  ConversationTarget target = 10; // required 会话目标
  PageQuery page = 11; // optional 展示分页游标；消息按 seq 升序（旧→新）展示，page.around 传 msg_id 可居中定位（jump-to-message）
  repeated string msg_ids = 15; // optional 按消息 id 批量读取；与 page 互斥，不分页、page 信息为空
}
message GetMessagesResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated Message messages = 10; // optional 消息列表
  PageInfo page = 11; // required 展示分页信息；msg_ids 批量读取场景为空
}

message DeleteMessageRequest {
  string msg_id = 10; // required 消息 ID
}
message DeleteMessageResponse {
  BaseResponse base = 1; // required 通用响应状态
  int64 seq = 10; // required 删除后的同步序号
}

message GetConversationsRequest {
