// OrgInfo 是组织展示资料字典：仅名字/头像，不参与同步（与 GroupInfo 同构）。
message OrgInfo {
  int64 org_id = 1; // required 组织 ID
  string name = 2; // required 组织名称
  string avatar = 3; // optional 组织头像 URL
}

// TagInfo 是 tag（部门/横向分组）展示资料字典：仅名字/头像，不参与同步。
message TagInfo {
  int64 tag_id = 1; // required tag ID
  string name = 2; // required tag 名称
  string avatar = 3; // optional tag 头像 URL
}

// Tag 是 tags（组织关系表）条目：组织架构唯一的同步域。一行表示"某父节点
// （组织根传 org_id，部门传 tag_id）下挂一个子项"；child_type 区分子项是
// 人（PERSON，child_id=uid）还是 tag（TAG，child_id=tag_id）；role 标识
// 该子项在这个父节点下是否为管理员。
message Tag {
  int64 tag_id = 1; // required 父节点 ID；在线展开时恒等于请求的 tag_id，展开组织根传 org_id
  int64 child_id = 2; // required 子项 ID：child_type=PERSON 时为 uid，child_type=TAG 时为 tag_id
  TagChildType child_type = 3; // required 子项类型
  string title = 4; // optional 本节点下的职务展示文本（仅人条目常用）
  int64 rank = 5; // required 本条边的排序值，越小越靠前；2147483647 表示未显式排序
  string sort_key = 6; // required 名字归一化排序键（人取昵称、tag 取 tag 名）
  TagRole role = 7; // required 子项在本节点下的角色，标识是否为管理员
  TagStatus status = 8; // required 在线展开恒为 ACTIVE；同步含 DELETED tombstone
  int64 seq = 9; // required 同步序号
}

message GetOrgInfosRequest {
  repeated int64 org_ids = 10; // required 组织 ID 列表，来自通讯录组织行；去重后受服务端批量上限约束
}
message GetOrgInfosResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated OrgInfo orgs = 10; // optional 组织展示资料列表
}

message GetTagInfosRequest {
  int64 org_id = 10; // required 组织 ID（分片路由键）
  repeated int64 tag_ids = 11; // required tag ID 列表，去重后受服务端批量上限约束
}
message GetTagInfosResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated TagInfo tags = 10; // optional tag 展示资料列表
}

message GetTagsRequest {
  int64 org_id = 10; // required 组织 ID（分片路由键）
  int64 tag_id = 11; // required 要展开的父节点；展开组织根传 tag_id=org_id，0 非法
  PageQuery page = 12; // optional 展示分页游标；按 (rank, sort_key, child_type, child_id) 升序，游标对客户端不透明
}
message GetTagsResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated Tag tags = 10; // optional 直接子项，仅 ACTIVE，tag 与人按绝对排序混合
  PageInfo page = 11; // required 展示分页信息
}

message SyncTagsRequest {
  int64 org_id = 10; // required 组织 ID
  int64 last_seq = 11; // optional 客户端最后同步序号
  int64 limit = 12; // optional 同步条数
  bool rebuild = 13; // optional 是否强制重建本地副本
}
message SyncTagsResponse {
  BaseResponse base = 1; // required 通用响应状态
  repeated Tag tags = 10; // optional 增量条目（含 tombstone）
  bool has_more = 11; // required 是否还有更多增量条目（达到 limit 时为 true）
  int64 cursor_seq = 12; // required 下一次增量同步应使用的 last_seq 游标，等于本批最大 seq；本批为空时为 0
}
