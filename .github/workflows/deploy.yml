name: Deploy Yimsg Server

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-yimsg
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 每台独立服务器一个 include 项：name 是展示用别名，host_secret 是对应 SSH_HOST_* secret 名。
        # 新增服务器时只需在这里加一行 include，无需改动后续步骤。
        include:
          - name: se
            host_secret: SSH_HOST_SE
          # gz（广州）首页已替换为专用 ICP 备案静态页（website-icp/，独立于 website/），
          # 不再纳入本自动化部署矩阵，避免被后续常规发布覆盖；更新该机器需手动执行。
    env:
      HOST: ${{ secrets[matrix.host_secret] }}
      # 同一台服务器可能同时被 GitHub Actions 和 tools/scripts/deploy-remote.sh（本机快速部署）触发；
      # 上传阶段用带这个 tag 的独立文件名/目录名，避免两边并发写同一个上传目标把内容写坏（历史教训：
      # 曾经两边同时 scp 到同一个 server.new，写出的文件大小相同但内容不同，服务器起不来）。
      RUN_TAG: gh-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: 配置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 安装前端依赖（提供 protocolgen 所需的 grpc_tools_node_protoc）
        run: npm ci

      - name: 安装 protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: 刷新协议生成物
        run: go run ./tools/cmd/protocolgen

      - name: 构建前端产物
        run: npm run build

      - name: 交叉编译服务端二进制（Linux/amd64）
        run: GOOS=linux GOARCH=amd64 go build -o server-linux-amd64 ./server/cmd/yimsg-server

      - name: 交叉编译 seed-demo 二进制（Linux/amd64，每次部署都从当前代码全新构建）
        run: GOOS=linux GOARCH=amd64 go build -o seed-demo-linux-amd64 ./server/tools/cmd/seed-demo

      - name: 交叉编译 yimsg-agent 二进制（Linux/amd64，客服 demo_kf_1~3 自动回复）
        run: GOOS=linux GOARCH=amd64 go build -o agent-linux-amd64 ./agent/cmd/yimsg-agent

      - name: 准备 yimsg-agent 环境变量文件（DeepSeek API Key）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          umask 077
          printf 'DEEPSEEK_API_KEY=%s\n' "$DEEPSEEK_API_KEY" > agent.env

      - name: 配置部署密钥
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/yimsg_deploy
          chmod 600 ~/.ssh/yimsg_deploy
          ssh-keyscan -T 20 -H -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 上传二进制与前端 / 官网产物
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SCP_TIMEOUT_SECONDS="${DEPLOY_SCP_TIMEOUT_SECONDS:-1800}"
          SCP_OPTS=(
            -i ~/.ssh/yimsg_deploy
            -P "$PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o TCPKeepAlive=yes
          )
          SSH_OPTS=(
            -i ~/.ssh/yimsg_deploy
            -p "$PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o TCPKeepAlive=yes
          )
          timed_scp() {
            local label="$1"
            shift
            echo "Uploading ${label} with ${SCP_TIMEOUT_SECONDS}s timeout"
            timeout --foreground "${SCP_TIMEOUT_SECONDS}s" scp "${SCP_OPTS[@]}" "$@"
          }
          # scp -r 上传目录内容时目标目录必须已存在，先在远程建好本次运行专属的临时目录。
          timeout --foreground 20s ssh "${SSH_OPTS[@]}" "${SSH_USER}@${HOST}" "mkdir -p /opt/yimsg/web.new.${RUN_TAG} /opt/yimsg/website.new.${RUN_TAG}"
          timed_scp "server binary" server-linux-amd64 "${SSH_USER}@${HOST}:/opt/yimsg/server.new.${RUN_TAG}"
          timed_scp "seed-demo binary" seed-demo-linux-amd64 "${SSH_USER}@${HOST}:/opt/yimsg/seed-demo.new.${RUN_TAG}"
          timed_scp "yimsg-agent binary" agent-linux-amd64 "${SSH_USER}@${HOST}:/opt/yimsg/agent.new.${RUN_TAG}"
          timed_scp "yimsg-agent 环境变量文件" agent.env "${SSH_USER}@${HOST}:/opt/yimsg/agent.env.new.${RUN_TAG}"
          timed_scp "web assets" -r web/. "${SSH_USER}@${HOST}:/opt/yimsg/web.new.${RUN_TAG}/"
          timed_scp "website assets" -r website/. "${SSH_USER}@${HOST}:/opt/yimsg/website.new.${RUN_TAG}/"

      - name: 远程原子替换二进制、清空数据并用新构建的 seed-demo 重新初始化，最后重启服务
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/yimsg_deploy
            -p "$PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o TCPKeepAlive=yes
          )
          timeout --foreground 1800s ssh "${SSH_OPTS[@]}" "${SSH_USER}@${HOST}" "
            set -euo pipefail
            # 上一步上传阶段已经用 RUN_TAG 隔开了各自的上传目标，这里只需要给最终原子替换这段
            # 临界区加文件锁：避免两边同时 stop/replace/seed-demo 互相踩踏；谁先抢到锁谁先跑完，
            # 后到的一方等前面跑完后照常执行（即后完成的部署最终生效）。
            exec 200>/opt/yimsg/.deploy.lock
            flock -w 1800 200
            # 项目处于演示/研发阶段：每次部署都清空 /opt/yimsg/data 并用 seed-demo 重建官网演示数据，
            # 不做旧数据兼容或迁移。先停服务，避免 systemd Restart=on-failure 在清空过程中把进程拉起来
            # 和 seed-demo 抢同一份数据目录。
            systemctl stop yimsg

            chmod +x /opt/yimsg/server.new.${RUN_TAG}
            mv /opt/yimsg/server.new.${RUN_TAG} /opt/yimsg/server

            chmod +x /opt/yimsg/seed-demo.new.${RUN_TAG}
            mv /opt/yimsg/seed-demo.new.${RUN_TAG} /opt/yimsg/seed-demo

            rm -rf /opt/yimsg/web
            mv /opt/yimsg/web.new.${RUN_TAG} /opt/yimsg/web
            rm -rf /opt/yimsg/website
            mv /opt/yimsg/website.new.${RUN_TAG} /opt/yimsg/website

            chown -R yimsg:yimsg /opt/yimsg
            setcap -r /opt/yimsg/server 2>/dev/null || true

            # seed-demo 内部会自行清空并重建 /opt/yimsg/data（含 media 上传目录）后写入演示数据。
            /opt/yimsg/seed-demo -config /opt/yimsg/config.toml
            chown -R yimsg:yimsg /opt/yimsg/data

            systemctl start yimsg

            # yimsg-agent（客服 demo_kf_1~3 自动回复）依赖第 4 节标准化初始化提前创建好
            # systemd unit；机器还没跑过 tools/scripts/init_server_env.sh 时这里只跳过，
            # 不影响本次服务端部署结果。
            if [[ -f /etc/systemd/system/yimsg-agent.service ]]; then
              systemctl stop yimsg-agent 2>/dev/null || true
              chmod +x /opt/yimsg/agent.new.${RUN_TAG}
              mv /opt/yimsg/agent.new.${RUN_TAG} /opt/yimsg/agent
              mv /opt/yimsg/agent.env.new.${RUN_TAG} /opt/yimsg/agent.env
              chown yimsg:yimsg /opt/yimsg/agent /opt/yimsg/agent.env
              chmod 600 /opt/yimsg/agent.env
              systemctl start yimsg-agent
            else
              echo 'yimsg-agent.service 不存在，跳过启动（需先手动运行 tools/scripts/init_server_env.sh 完成标准化初始化）'
              rm -f /opt/yimsg/agent.new.${RUN_TAG} /opt/yimsg/agent.env.new.${RUN_TAG}
            fi
          "

      - name: 验证部署结果
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_OPTS=(
            -i ~/.ssh/yimsg_deploy
            -p "$PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=4
            -o TCPKeepAlive=yes
          )
          timeout --foreground 120s ssh "${SSH_OPTS[@]}" "${SSH_USER}@${HOST}" "systemctl status yimsg --no-pager"
          curl -k -sS --connect-timeout 20 --max-time 60 -o /dev/null -w "[${{ matrix.name }}] 官网 /: %{http_code}\n" "https://${HOST}/"
          curl -k -sS --connect-timeout 20 --max-time 60 -o /dev/null -w "[${{ matrix.name }}] 聊天 /app/: %{http_code}\n" "https://${HOST}/app/"
          # yimsg-agent 不参与上面的核心可用性判定：DEEPSEEK_API_KEY 未配置时会一直
          # Restart=on-failure，这是预期状态，不应让整次部署失败，这里只打印状态供人工确认。
          timeout --foreground 60s ssh "${SSH_OPTS[@]}" "${SSH_USER}@${HOST}" "systemctl status yimsg-agent --no-pager" || true
