name: Deploy Yimsg Server

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-yimsg
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [se, gz]
    env:
      # strategy.matrix 表达式上下文不能访问 secrets，SSH_HOST 改在 job 级别按 matrix.name 计算。
      SSH_HOST: ${{ matrix.name == 'se' && secrets.SSH_HOST_SE || secrets.SSH_HOST_GZ }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: 配置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖（提供 protocolgen 所需的 grpc_tools_node_protoc）
        run: |
          cd frontend
          npm ci

      - name: 安装 protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: 刷新协议生成物
        run: go run ./tools/cmd/protocolgen

      - name: 构建前端产物
        run: |
          cd frontend
          npm run build

      - name: 交叉编译服务端二进制（Linux/amd64）
        run: GOOS=linux GOARCH=amd64 go build -o server-linux-amd64 ./cmd/server

      - name: 交叉编译 seed-demo 二进制（Linux/amd64，每次部署都从当前代码全新构建）
        run: GOOS=linux GOARCH=amd64 go build -o seed-demo-linux-amd64 ./tools/cmd/seed-demo

      - name: 配置部署密钥
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/yimsg_deploy
          chmod 600 ~/.ssh/yimsg_deploy
          ssh-keyscan -H -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 首次初始化 yimsg-gz（建账号 / 目录 / config.toml / systemd unit，yimsg-se 已具备无需重复执行）
        if: matrix.name == 'gz'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_OPTS=(-i ~/.ssh/yimsg_deploy -p "$PORT")
          SCP_OPTS=(-i ~/.ssh/yimsg_deploy -P "$PORT")

          ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" '
            set -euo pipefail
            getent group yimsg >/dev/null || groupadd --system yimsg
            id -u yimsg >/dev/null 2>&1 || useradd --system --home-dir /opt/yimsg --shell /usr/sbin/nologin --gid yimsg yimsg
            mkdir -p /opt/yimsg/web /opt/yimsg/website /opt/yimsg/data
          '

          cat > /tmp/yimsg-config.toml <<'EOF'
          [server]
          host = "0.0.0.0"
          port = 443
          tls_cert = "/etc/ssl/certs/yimsg.pem"
          tls_key = "/etc/ssl/certs/yimsg.key"

          [database]
          data_dir = "/opt/yimsg/data"
          shard_count = 4

          [frontend]
          static_dir = "/opt/yimsg/web"
          mount_path = "/chat/"

          [website]
          static_dir = "/opt/yimsg/website"
          mount_path = "/"

          [media]
          upload_dir = "/opt/yimsg/data/media"
          EOF

          cat > /tmp/yimsg.service <<'EOF'
          [Unit]
          Description=Yimsg Server
          After=network.target

          [Service]
          Type=simple
          User=yimsg
          Group=yimsg
          WorkingDirectory=/opt/yimsg
          ExecStart=/opt/yimsg/server /opt/yimsg/config.toml
          Restart=on-failure
          RestartSec=3
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true

          [Install]
          WantedBy=multi-user.target
          EOF

          scp "${SCP_OPTS[@]}" /tmp/yimsg-config.toml "${SSH_USER}@${SSH_HOST}:/opt/yimsg/config.toml"
          scp "${SCP_OPTS[@]}" /tmp/yimsg.service "${SSH_USER}@${SSH_HOST}:/etc/systemd/system/yimsg.service"
          rm -f /tmp/yimsg-config.toml /tmp/yimsg.service

          ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" '
            set -euo pipefail
            systemctl daemon-reload
            systemctl enable yimsg
            chown -R yimsg:yimsg /opt/yimsg
          '
          # 注意：网站 TLS 证书（/etc/ssl/certs/yimsg.pem、.key）不由本 workflow 同步，
          # 需要在首次运行本 job 前手动从 yimsg-se 搬到 yimsg-gz，否则后面的 systemctl start 会失败。

      - name: 上传二进制与前端 / 官网产物
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_OPTS=(-i ~/.ssh/yimsg_deploy -P "$PORT")
          SCP_OPTS=(-i ~/.ssh/yimsg_deploy -P "$PORT")
          scp "${SCP_OPTS[@]}" server-linux-amd64 "${SSH_USER}@${SSH_HOST}:/opt/yimsg/server.new"
          scp "${SCP_OPTS[@]}" seed-demo-linux-amd64 "${SSH_USER}@${SSH_HOST}:/opt/yimsg/seed-demo.new"
          scp "${SCP_OPTS[@]}" -r web/. "${SSH_USER}@${SSH_HOST}:/opt/yimsg/web/"
          scp "${SCP_OPTS[@]}" -r website/. "${SSH_USER}@${SSH_HOST}:/opt/yimsg/website/"

      - name: 远程原子替换二进制、清空数据并用新构建的 seed-demo 重新初始化，最后重启服务
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/yimsg_deploy -p "$PORT" "${SSH_USER}@${SSH_HOST}" '
            set -euo pipefail
            # 项目处于演示/研发阶段：每次部署都清空 /opt/yimsg/data 并用 seed-demo 重建官网演示数据，
            # 不做旧数据兼容或迁移。先停服务，避免 systemd Restart=on-failure 在清空过程中把进程拉起来
            # 和 seed-demo 抢同一份数据目录。
            systemctl stop yimsg

            chmod +x /opt/yimsg/server.new
            setcap "cap_net_bind_service=+ep" /opt/yimsg/server.new
            mv /opt/yimsg/server.new /opt/yimsg/server

            chmod +x /opt/yimsg/seed-demo.new
            mv /opt/yimsg/seed-demo.new /opt/yimsg/seed-demo

            chown -R yimsg:yimsg /opt/yimsg

            # seed-demo 内部会自行清空并重建 /opt/yimsg/data（含 media 上传目录）后写入演示数据。
            /opt/yimsg/seed-demo -config /opt/yimsg/config.toml
            chown -R yimsg:yimsg /opt/yimsg/data

            systemctl start yimsg
          '

      - name: 验证部署结果
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/yimsg_deploy -p "$PORT" "${SSH_USER}@${SSH_HOST}" "systemctl status yimsg --no-pager"
          curl -k -sS -o /dev/null -w "[${{ matrix.name }}] 官网 /: %{http_code}\n" "https://${SSH_HOST}/"
          curl -k -sS -o /dev/null -w "[${{ matrix.name }}] 聊天 /chat/: %{http_code}\n" "https://${SSH_HOST}/chat/"
