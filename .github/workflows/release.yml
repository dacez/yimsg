name: Release Yimsg

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的语义化版本，例如 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

concurrency:
  group: release-yimsg
  cancel-in-progress: false

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定版本
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${EVENT_NAME}" == "push" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="${INPUT_VERSION#v}"
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "非法版本号: ${VERSION}" >&2
            exit 1
          fi
          if [[ "$(tr -d '\r\n' < VERSION)" != "${VERSION}" ]]; then
            echo "VERSION 文件与发布版本不一致" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"

      - name: 配置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: 运行全量测试
        run: ./tools/run_all_tests.sh

      - name: 构建四个平台发行包
        env:
          YIMSG_RELEASE_SKIP_BUILD: "1"
        run: bash ./tools/scripts/build_release.sh "${{ steps.version.outputs.version }}"

      - name: 上传工作流产物
        uses: actions/upload-artifact@v4
        with:
          name: yimsg-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE=".github/release-notes/v${VERSION}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            gh release create "${TAG}" dist/* --target "${GITHUB_SHA}" --title "Yimsg ${VERSION}" --notes-file "${NOTES_FILE}"
          else
            gh release create "${TAG}" dist/* --target "${GITHUB_SHA}" --title "Yimsg ${VERSION}" --generate-notes
          fi
