<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yimsg 客服组件 demo</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .tip { margin-bottom: 8px; }
    .cred { margin-bottom: 16px; }
    .agents { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .agents button { padding: 6px 14px; border-radius: 999px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 13px; }
    .agents button.active { background: #5b5bf0; color: #fff; border-color: #5b5bf0; }
    .quick-questions-label { margin: 4px 0; font-size: 13px; color: #666; }
    .quick-questions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .quick-questions button { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: #f7f7fb; cursor: pointer; font-size: 12px; color: #333; }
    .quick-questions button:hover { background: #ecebff; border-color: #c9c8f5; }
  </style>
</head>
<body>
  <h1 data-i18n="h1">yimsg · 客服组件 demo</h1>
  <p class="tip" data-i18n-html="tip">页面已自动注册一个随机访客账号并登录，只显示会话列表 + 聊天视图（<code>viewMode: 'chat-only'</code>）。私聊不要求好友关系，选择下方任意客服即可发起临时会话。</p>
  <div class="cred" id="cred" data-i18n="registering">正在注册访客账号…</div>
  <div class="agents" id="agents"></div>
  <p class="quick-questions-label" data-i18n="quickQuestionsLabel">示例问题（点击直接发送给对应客服）：</p>
  <div class="quick-questions" id="quick-questions"></div>
  <div id="chat-host" class="host"></div>
  <script type="module">
    // 单独的小模块，只依赖本地 demo-i18n.js：让文案尽快跟随语言渲染，
    // 不必等待下面 mount 用的 yimsg-uikit.js（体积大得多）下载完成，避免先闪一下中文再变英文。
    import { detectDemoLang, applyDemoI18n } from './demo-i18n.js';

    const TRANSLATIONS = {
      zh: {
        pageTitle: 'yimsg 客服组件 demo',
        h1: 'yimsg · 客服组件 demo',
        tip: "页面已自动注册一个随机访客账号并登录，只显示会话列表 + 聊天视图（<code>viewMode: 'chat-only'</code>）。私聊不要求好友关系，选择下方任意客服即可发起临时会话。",
        registering: '正在注册访客账号…',
        guestNickname: '访客',
        cred: (username, password) => `访客账号：${username}　密码：${password}`,
        initFailed: (msg) => `初始化失败：${msg}。请先运行 go run ./tools/cmd/seed-demo 构造演示数据。`,
        agents: [
          { username: 'demo_kf_1', label: '客服-小美' },
          { username: 'demo_kf_2', label: '客服-小林' },
          { username: 'demo_kf_3', label: '客服-阿强' },
        ],
        quickQuestionsLabel: '示例问题（点击直接发送给对应客服）：',
        quickQuestions: [
          { agent: 'demo_kf_1', text: '忘记密码怎么办？' },
          { agent: 'demo_kf_1', text: '可以同时在多个设备登录吗？' },
          { agent: 'demo_kf_1', text: '可以拉黑或屏蔽骚扰我的人吗？' },
          { agent: 'demo_kf_2', text: '怎么把客服组件嵌入到我自己的网站？' },
          { agent: 'demo_kf_2', text: '有没有可以直接调用的 SDK 或 API？' },
          { agent: 'demo_kf_3', text: '系统故障时要怎么联系人工升级处理？' },
          { agent: 'demo_kf_3', text: '系统维护会不会影响我正在进行的对话？' },
          { agent: 'demo_kf_1', text: '你们支持退款吗？' },
          { agent: 'demo_kf_1', text: '聊天记录能保存多久？' },
          { agent: 'demo_kf_1', text: '群聊最多能拉多少人？' },
        ],
      },
      en: {
        pageTitle: 'yimsg customer service widget demo',
        h1: 'yimsg · Customer service widget demo',
        tip: "This page auto-registers and signs in a random guest account, showing only the conversation list + chat view (<code>viewMode: 'chat-only'</code>). Direct chat doesn't require a friend relationship — pick any agent below to start a temporary conversation.",
        registering: 'Registering guest account…',
        guestNickname: 'Guest',
        cred: (username, password) => `Guest account: ${username}  Password: ${password}`,
        initFailed: (msg) => `Init failed: ${msg}. Please run "go run ./tools/cmd/seed-demo" first to seed demo data.`,
        agents: [
          { username: 'demo_kf_1', label: 'Agent Mei' },
          { username: 'demo_kf_2', label: 'Agent Lin' },
          { username: 'demo_kf_3', label: 'Agent Qiang' },
        ],
        quickQuestionsLabel: 'Sample questions (click to send to the matching agent):',
        quickQuestions: [
          { agent: 'demo_kf_1', text: 'What do I do if I forgot my password?' },
          { agent: 'demo_kf_1', text: 'Can I log in on multiple devices at the same time?' },
          { agent: 'demo_kf_1', text: 'Can I block someone who is harassing me?' },
          { agent: 'demo_kf_2', text: 'How do I embed the customer service widget on my own website?' },
          { agent: 'demo_kf_2', text: 'Is there an SDK or API I can call directly?' },
          { agent: 'demo_kf_3', text: 'How do I escalate to a human when there is a system outage?' },
          { agent: 'demo_kf_3', text: 'Will scheduled maintenance affect my ongoing conversation?' },
          { agent: 'demo_kf_1', text: 'Do you offer refunds?' },
          { agent: 'demo_kf_1', text: 'How long is chat history retained?' },
          { agent: 'demo_kf_1', text: "What's the member limit for a group chat?" },
        ],
      },
    };

    const lang = detectDemoLang();
    const dict = TRANSLATIONS[lang];
    applyDemoI18n(lang, dict);
    window.__demoI18n = { lang, dict };
  </script>
  <script type="module">
    import { mount, YimsgClient } from '/uikit/yimsg-uikit.js';
    import { demoLocale } from './demo-i18n.js';

    const { lang, dict } = window.__demoI18n;

    function randomSuffix() {
      return Math.random().toString(36).slice(2, 8);
    }

    async function main() {
      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
      const uploadUrl = '/api/upload';
      const username = `guest_${randomSuffix()}`;
      const password = randomSuffix() + randomSuffix();

      const client = new YimsgClient({ wsUrl, uploadUrl });
      await client.register(username, password, dict.guestNickname);
      const auth = await client.login(username, password);
      await client.startSession();

      document.getElementById('cred').textContent = dict.cred(username, password);

      const host = document.getElementById('chat-host');
      const handle = mount(host, { client, token: auth.token, viewMode: 'chat-only', theme: 'light', locale: demoLocale(lang) });

      const agentsEl = document.getElementById('agents');
      const quickEl = document.getElementById('quick-questions');
      const agentButtons = new Map(); // username -> 客服切换按钮，供 openAgent 高亮当前客服
      const uidByUsername = new Map(); // username -> uid，避免重复 searchUser
      let activeUsername = null;

      // openAgent 是"切到某个客服的临时会话"的唯一入口，客服切换按钮和示例问题按钮
      // 共用同一套逻辑：按用户名查 uid（查过的缓存住）、高亮对应按钮、切换会话。
      async function openAgent(username) {
        let uid = uidByUsername.get(username);
        if (uid == null) {
          const info = await client.searchUser(username);
          if (!info) return null;
          uid = info.uid;
          uidByUsername.set(username, uid);
        }
        if (activeUsername !== username) {
          activeUsername = username;
          for (const b of agentsEl.querySelectorAll('button')) b.classList.remove('active');
          agentButtons.get(username)?.classList.add('active');
          await handle.openConversation({ friendUid: uid });
        }
        return uid;
      }

      for (const agent of dict.agents) {
        const btn = document.createElement('button');
        btn.textContent = agent.label;
        btn.addEventListener('click', () => openAgent(agent.username));
        agentsEl.appendChild(btn);
        agentButtons.set(agent.username, btn);
      }

      // 示例问题：点击即切到对应客服的会话并直接把问题文本发送出去，复用 UIKit
      // 挂载时暴露出来的同一个 client，不重新拼协议（见 packages/uikit/src/embed.ts）。
      for (const q of dict.quickQuestions) {
        const btn = document.createElement('button');
        btn.textContent = q.text;
        btn.addEventListener('click', async () => {
          const uid = await openAgent(q.agent);
          if (uid == null) return;
          await client.sendText({ toUid: uid }, q.text);
        });
        quickEl.appendChild(btn);
      }

      // 默认打开第一个客服的临时会话。
      await openAgent(dict.agents[0]?.username);
    }

    main().catch((err) => {
      document.getElementById('cred').textContent = '';
      const host = document.getElementById('chat-host');
      host.className = 'host error';
      host.textContent = dict.initFailed(err?.message || err);
      console.warn('[demo-customer-service] init failed', err);
    });
  </script>
</body>
</html>
