<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yimsg 手机 / PC 双端布局 demo</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 16px; background: #f5f6fa; color: #333; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    .tip { font-size: 13px; color: #666; margin-bottom: 16px; }
    .panels { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
    .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; padding: 8px 12px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); font-size: 13px; }
    .panel-header .cred { color: #4550e5; font-weight: 600; }
    .panel-mobile .panel-header, .panel-mobile .panel-host { width: 375px; max-width: 100%; }
    .panel-desktop .panel-header, .panel-desktop .panel-host { width: min(760px, 100%); }
    .panel-mobile .panel-host { height: min(667px, 78vh); }
    .panel-desktop .panel-host { height: min(560px, 78vh); }
    .panel-host { border-radius: 8px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.08); background: #fff; box-sizing: border-box; }
    .panel-error { padding: 16px; color: #b3261e; font-size: 13px; }
  </style>
</head>
<body>
  <h1>yimsg · 手机 / PC 双端布局 demo</h1>
  <p class="tip">同一套 UIKit 通过 <code>layout: 'mobile' / 'desktop'</code> 强制切换布局：手机端底部导航 + 单栏切换，桌面端侧栏导航 + 多栏并列。两个账号已自动登录，互为好友，可直接体验两种布局下的完整应用。</p>
  <div class="panels" id="panels"></div>
  <script type="module">
    import { mount, YimsgClient } from '/chat/uikit/yimsg-uikit.js';

    const PASSWORD = 'Demo@123456';
    const PANELS = [
      { username: 'demo_bob', label: 'Bob · 手机布局', layout: 'mobile', panelClass: 'panel-mobile' },
      { username: 'demo_carol', label: 'Carol · 桌面布局', layout: 'desktop', panelClass: 'panel-desktop' },
    ];

    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
    const uploadUrl = '/api/upload';
    const panelsEl = document.getElementById('panels');

    for (const item of PANELS) {
      const panel = document.createElement('div');
      panel.className = `panel ${item.panelClass}`;
      panel.innerHTML = `
        <div class="panel-header">
          <span>${item.label}</span>
          <span class="cred">用户名：${item.username}　密码：${PASSWORD}</span>
        </div>
        <div class="panel-host panel-error" hidden></div>
      `;
      panelsEl.appendChild(panel);
      const host = document.createElement('div');
      host.className = 'panel-host';
      panel.replaceChild(host, panel.querySelector('.panel-host'));

      const client = new YimsgClient({ wsUrl, uploadUrl });
      client.login(item.username, PASSWORD).then(() => client.startSession()).then(() => {
        mount(host, { client, viewMode: 'full', layout: item.layout, theme: 'auto', locale: 'auto' });
      }).catch((err) => {
        host.classList.add('panel-error');
        host.textContent = `登录失败：${err?.message || err}。请先运行 go run ./tools/cmd/seed-demo 构造演示数据。`;
        console.warn('[demo-responsive] login failed', item.username, err);
      });
    }
  </script>
</body>
</html>
