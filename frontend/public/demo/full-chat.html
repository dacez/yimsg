<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yimsg 完整体验 demo</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .tip { margin-bottom: 16px; }
    .panels { display: flex; gap: 16px; flex-wrap: wrap; }
    .panel { flex: 1; min-width: 320px; }
    .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; padding: 8px 12px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); font-size: 13px; }
    .panel-host { width: 100%; height: min(640px, 78vh); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.08); background: #fff; }
    .panel-error { padding: 16px; color: #b3261e; font-size: 13px; }
  </style>
</head>
<body>
  <h1 data-i18n="h1">yimsg · 完整体验 demo</h1>
  <p class="tip" data-i18n="tip">三个账号已自动登录，互为好友并共享同一个群聊「产品体验群」。在任意一栏发消息，其余两栏会实时收到——用于演示完整的登录、群聊与单聊能力。</p>
  <div class="panels" id="panels"></div>
  <script type="module">
    // 单独的小模块，只依赖本地 demo-i18n.js：让文案尽快跟随语言渲染，
    // 不必等待下面 mount 用的 yimsg-uikit.js（体积大得多）下载完成，避免先闪一下中文再变英文。
    import { detectDemoLang, applyDemoI18n } from './demo-i18n.js';

    const PASSWORD = 'Demo@123456';
    const TRANSLATIONS = {
      zh: {
        pageTitle: 'yimsg 完整体验 demo',
        h1: 'yimsg · 完整体验 demo',
        tip: '三个账号已自动登录，互为好友并共享同一个群聊「产品体验群」。在任意一栏发消息，其余两栏会实时收到——用于演示完整的登录、群聊与单聊能力。',
        cred: (username) => `用户名：${username}　密码：${PASSWORD}`,
        loginFailed: (msg) => `登录失败：${msg}。请先运行 go run ./tools/cmd/seed-demo 构造演示数据。`,
      },
      en: {
        pageTitle: 'yimsg full experience demo',
        h1: 'yimsg · Full experience demo',
        tip: 'Three accounts are signed in automatically, already friends, and share one group chat "Product Experience Group". Send a message in any panel and the other two receive it in real time — this demonstrates full login, group chat, and direct chat.',
        cred: (username) => `Username: ${username}  Password: ${PASSWORD}`,
        loginFailed: (msg) => `Sign-in failed: ${msg}. Please run "go run ./tools/cmd/seed-demo" first to seed demo data.`,
      },
    };

    const lang = detectDemoLang();
    const dict = TRANSLATIONS[lang];
    applyDemoI18n(lang, dict);
    window.__demoI18n = { lang, dict };
  </script>
  <script type="module">
    import { mount, YimsgClient } from '/uikit/yimsg-uikit.js';
    import { demoLocale } from './demo-i18n.js';

    const { lang, dict } = window.__demoI18n;
    const PASSWORD = 'Demo@123456';
    const ACCOUNTS = [
      { username: 'demo_alice', label: 'Alice' },
      { username: 'demo_bob', label: 'Bob' },
      { username: 'demo_carol', label: 'Carol' },
    ];

    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
    const uploadUrl = '/api/upload';
    const panelsEl = document.getElementById('panels');

    for (const account of ACCOUNTS) {
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = `
        <div class="panel-header">
          <span>${account.label}</span>
          <span class="cred">${dict.cred(account.username)}</span>
        </div>
        <div class="panel-host panel-error" hidden></div>
      `;
      panelsEl.appendChild(panel);
      const host = document.createElement('div');
      host.className = 'panel-host';
      panel.replaceChild(host, panel.querySelector('.panel-host'));

      const client = new YimsgClient({ wsUrl, uploadUrl });
      let token = '';
      client.login(account.username, PASSWORD).then((auth) => {
        token = auth.token;
        return client.startSession();
      }).then(() => {
        mount(host, { client, token, viewMode: 'full', theme: 'light', locale: demoLocale(lang) });
      }).catch((err) => {
        host.classList.add('panel-error');
        host.textContent = dict.loginFailed(err?.message || err);
        console.warn('[demo-full-chat] login failed', account.username, err);
      });
    }
  </script>
</body>
</html>
