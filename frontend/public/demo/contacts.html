<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yimsg 通讯录 demo</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .tip { margin-bottom: 8px; }
    .cred { margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1 data-i18n="h1">yimsg · 通讯录 demo</h1>
  <p class="tip" data-i18n="tip">已自动登录一个真实账号（保留底部导航，可在聊天 / 通讯录 / 设置间自由切换，点"通讯录"查看）：既有私人好友，也挂了一个 4 层 tag、约 76 人的复杂组织架构。</p>
  <div class="cred" data-i18n="cred">用户名：demo_alice　密码：Demo@123456</div>
  <div id="chat-host" class="host"></div>
  <script type="module">
    // 单独的小模块，只依赖本地 demo-i18n.js：让文案尽快跟随语言渲染，
    // 不必等待下面 mount 用的 yimsg-uikit.js（体积大得多）下载完成，避免先闪一下中文再变英文。
    import { detectDemoLang, applyDemoI18n } from './demo-i18n.js';

    const TRANSLATIONS = {
      zh: {
        pageTitle: 'yimsg 通讯录 demo',
        h1: 'yimsg · 通讯录 demo',
        tip: '已自动登录一个真实账号（保留底部导航，可在聊天 / 通讯录 / 设置间自由切换，点"通讯录"查看）：既有私人好友，也挂了一个 4 层 tag、约 76 人的复杂组织架构。',
        cred: '用户名：demo_alice　密码：Demo@123456',
        loginFailed: (msg) => `登录失败：${msg}。请先运行 go run ./tools/cmd/seed-demo 构造演示数据。`,
      },
      en: {
        pageTitle: 'yimsg contacts demo',
        h1: 'yimsg · Contacts demo',
        tip: 'Signed in automatically with a real account (bottom nav kept, switch freely between chat / contacts / settings, click "Contacts" to view): mixes personal friends with a sample org chart of about 76 people across 4 tag levels.',
        cred: 'Username: demo_alice  Password: Demo@123456',
        loginFailed: (msg) => `Sign-in failed: ${msg}. Please run "go run ./tools/cmd/seed-demo" first to seed demo data.`,
      },
    };

    const lang = detectDemoLang();
    const dict = TRANSLATIONS[lang];
    applyDemoI18n(lang, dict);
    window.__demoI18n = { lang, dict };
  </script>
  <script type="module">
    import { mount, YimsgClient } from '/uikit/yimsg-uikit.js';
    import { demoLocale } from './demo-i18n.js';

    const { lang, dict } = window.__demoI18n;
    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
    const uploadUrl = '/api/upload';
    const host = document.getElementById('chat-host');

    const client = new YimsgClient({ wsUrl, uploadUrl });
    let token = '';
    client.login('demo_alice', 'Demo@123456').then((auth) => {
      token = auth.token;
      return client.startSession();
    }).then(() => {
      mount(host, { client, token, viewMode: 'full', theme: 'light', locale: demoLocale(lang) });
    }).catch((err) => {
      host.className = 'host error';
      host.textContent = dict.loginFailed(err?.message || err);
      console.warn('[demo-contacts] login failed', err);
    });
  </script>
</body>
</html>
